<body>
<script>
if (new URLSearchParams(window.location.search).get("print") === "1") {

<button class="export-frame-button" type="button" onclick="openFrameExport()">Export map to frame</button>
<div class="print-page" aria-hidden="true">

<script>
let map;
let roadsLayer;
let roadsInfoWindow;
let selectedRoadFeature;

const LAYER_Z_INDEX = {
  default: 10,
  roads: 90,
  exhibit: 120,
  city: 150
};

const PHASE_ROAD_IDS = {
  phase1: new Set([115015, 115016]),
  phase2: new Set([506, 122218])
};

const EXHIBIT_POINTS = {
  washingtonFieldsCommercial: { lng: -113.4866, lat: 37.0830 },
  longValleyTrails: { lng: -113.4687, lat: 37.0945 },
  alaia: { lng: -113.4940, lat: 37.0585 },
  ara: { lng: -113.4943, lat: 37.0288 },
  rws: { lng: -113.4882, lat: 37.0829 },
  airport: { lng: -113.5092, lat: 37.0363 },
  phase1: { lng: -113.5179, lat: 37.0852 },
  phase2: { lng: -113.4986, lat: 37.0849 },
  phase3: { lng: -113.5627, lat: 37.0850 }
};

const CALLOUT_STORAGE_KEY = "gwrExhibitCallouts";
const FURNITURE_STORAGE_KEY = "gwrExhibitFurniture";
const IS_PRINT_VIEW = new URLSearchParams(window.location.search).get("print") === "1";

const LAND_USE_COLORS = {
  HCOM: "#E15B5D",
  NCOM: "#B94E4E",
  CCOM: "#F04B4B",
  RCOM: "#8F4A57",
  CV: "#F4C4E4",
  BUS: "#5BA7F2",
  IND: "#C346F5",
  PUD: "#B6AC96",
  "PUD-C": "#C6764F",
  "PUD-R": "#F4D9B4",
  HD: "#F47C3C",
  MHD: "#F4A0A0",
  MD: "#FFC85A",
  LD: "#F7F7D8",
  VLD: "#D7FFD3",
  EST: "#6DBD45",
  AG: "#98C04A",
  P: "#4D8C6F",
  NYD: "#D9D9D9",
  OS: "#E8F5DD",
  DET: "#D9F4FF"
};

function getPolygonArea(coords) {
  let area = 0;

  for (let i = 0, j = coords.length - 1; i < coords.length; j = i++) {
    const [lng1, lat1] = coords[j];
    const [lng2, lat2] = coords[i];
    area += lng1 * lat2 - lng2 * lat1;
  }

  return Math.abs(area / 2);
}

function getPolygonCenter(coords) {
  let area = 0;
  let lngSum = 0;
  let latSum = 0;

  for (let i = 0, j = coords.length - 1; i < coords.length; j = i++) {
    const [lng1, lat1] = coords[j];
    const [lng2, lat2] = coords[i];
    const cross = lng1 * lat2 - lng2 * lat1;

    area += cross;
    lngSum += (lng1 + lng2) * cross;
    latSum += (lat1 + lat2) * cross;
  }

  if (area === 0) {
    const center = coords.reduce((total, coord) => {
      total.lng += coord[0];
      total.lat += coord[1];
      return total;
    }, { lng: 0, lat: 0 });

    return {
      lng: center.lng / coords.length,
      lat: center.lat / coords.length,
      area: 0
    };
  }

  return {
    lng: lngSum / (3 * area),
    lat: latSum / (3 * area),
    area: Math.abs(area / 2)
  };
}

function getFeatureRings(feature) {
  if (!feature.geometry) return [];

  if (feature.geometry.type === "Polygon") {
    return [feature.geometry.coordinates[0]];
  }

  if (feature.geometry.type === "MultiPolygon") {
    return feature.geometry.coordinates.map(polygon => polygon[0]);
  }

  return [];
}

function getFeatureLabelArea(feature) {
  return getFeatureRings(feature).reduce((total, coords) => {
    return total + getPolygonArea(coords);
  }, 0);
}

function getFeatureLabelCenter(feature) {
  const centers = getFeatureRings(feature).map(getPolygonCenter);
  const totalArea = centers.reduce((total, center) => total + center.area, 0);

  if (totalArea > 0) {
    return centers.reduce((total, center) => {
      total.lng += center.lng * center.area / totalArea;
      total.lat += center.lat * center.area / totalArea;
      return total;
    }, { lng: 0, lat: 0 });
  }

  return centers.reduce((total, center) => {
    total.lng += center.lng / centers.length;
    total.lat += center.lat / centers.length;
    return total;
  }, { lng: 0, lat: 0 });
}

function getFeatureBounds(feature) {
  return getFeatureRings(feature).flat().reduce((bounds, coord) => {
    const [lng, lat] = coord;

    return {
      minLng: Math.min(bounds.minLng, lng),
      minLat: Math.min(bounds.minLat, lat),
      maxLng: Math.max(bounds.maxLng, lng),
      maxLat: Math.max(bounds.maxLat, lat)
    };
  }, {
    minLng: Infinity,
    minLat: Infinity,
    maxLng: -Infinity,
    maxLat: -Infinity
  });
}

function getBoundsGap(first, second) {
  const lngGap = Math.max(0, first.minLng - second.maxLng, second.minLng - first.maxLng);
  const latGap = Math.max(0, first.minLat - second.maxLat, second.minLat - first.maxLat);

  return Math.hypot(lngGap, latGap);
}

function isPointInRing(point, ring) {
  let inside = false;

  for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
    const [lng1, lat1] = ring[i];
    const [lng2, lat2] = ring[j];
    const crossesLatitude = lat1 > point.lat !== lat2 > point.lat;

    if (crossesLatitude) {
      const crossingLng = (lng2 - lng1) * (point.lat - lat1) / (lat2 - lat1) + lng1;
      if (point.lng < crossingLng) inside = !inside;
    }
  }

  return inside;
}

function isPointInFeature(point, feature) {
  return getFeatureRings(feature).some(ring => isPointInRing(point, ring));
}

function getBoundsCenter(bounds) {
  return {
    lng: (bounds.minLng + bounds.maxLng) / 2,
    lat: (bounds.minLat + bounds.maxLat) / 2
  };
}

function getBoundsIntersection(first, second) {
  const bounds = {
    minLng: Math.max(first.minLng, second.minLng),
    minLat: Math.max(first.minLat, second.minLat),
    maxLng: Math.min(first.maxLng, second.maxLng),
    maxLat: Math.min(first.maxLat, second.maxLat)
  };

  if (bounds.minLng > bounds.maxLng || bounds.minLat > bounds.maxLat) return null;
  return bounds;
}

function getFeatureCenterInsideBounds(feature, bounds) {
  const visibleBounds = getBoundsIntersection(getFeatureBounds(feature), bounds);

  if (!visibleBounds) return null;

  const columns = 24;
  const rows = 24;
  const points = [];

  for (let column = 0; column <= columns; column++) {
    for (let row = 0; row <= rows; row++) {
      const point = {
        lng: visibleBounds.minLng + (visibleBounds.maxLng - visibleBounds.minLng) * column / columns,
        lat: visibleBounds.minLat + (visibleBounds.maxLat - visibleBounds.minLat) * row / rows
      };

      if (isPointInFeature(point, feature)) points.push(point);
    }
  }

  if (points.length === 0) return getBoundsCenter(visibleBounds);

  return points.reduce((center, point) => {
    center.lng += point.lng / points.length;
    center.lat += point.lat / points.length;
    return center;
  }, { lng: 0, lat: 0 });
}

function getFeaturePointNearTargetInsideBounds(feature, bounds, target) {
  const visibleBounds = getBoundsIntersection(getFeatureBounds(feature), bounds);

  if (!visibleBounds) return null;

  const columns = 36;
  const rows = 36;
  let bestPoint = null;
  let bestDistance = Infinity;

  for (let column = 0; column <= columns; column++) {
    for (let row = 0; row <= rows; row++) {
      const point = {
        lng: visibleBounds.minLng + (visibleBounds.maxLng - visibleBounds.minLng) * column / columns,
        lat: visibleBounds.minLat + (visibleBounds.maxLat - visibleBounds.minLat) * row / rows
      };

      if (!isPointInFeature(point, feature)) continue;

      const distance = Math.hypot(point.lng - target.lng, point.lat - target.lat);

      if (distance < bestDistance) {
        bestDistance = distance;
        bestPoint = point;
      }
    }
  }

  return bestPoint;
}

function addOpenSpaceHatch(feature) {
  getFeatureRings(feature).forEach(ring => {
    const bounds = getFeatureBounds({ geometry: { type: "Polygon", coordinates: [ring] } });
    const spacing = 0.00012;
    const sampleStep = 0.000025;
    const minDiagonal = bounds.minLat - bounds.maxLng;
    const maxDiagonal = bounds.maxLat - bounds.minLng;

    for (let diagonal = minDiagonal; diagonal <= maxDiagonal; diagonal += spacing) {
      let segment = [];

      for (let lng = bounds.minLng; lng <= bounds.maxLng; lng += sampleStep) {
        const point = { lng: lng, lat: lng + diagonal };
        const insideBounds = point.lat >= bounds.minLat && point.lat <= bounds.maxLat;
        const insideRing = insideBounds && isPointInRing(point, ring);

        if (insideRing) {
          segment.push(point);
        }
        else if (segment.length > 1) {
          addHatchSegment(segment);
          segment = [];
        }
      }

      if (segment.length > 1) addHatchSegment(segment);
    }
  });
}

function addHatchSegment(path) {
  new google.maps.Polyline({
    path: path,
    map: map,
    strokeColor: "#8FB07B",
    strokeOpacity: 0.9,
    strokeWeight: 1,
    clickable: false,
    zIndex: LAYER_Z_INDEX.default + 1
  });
}

function getGeoJsonBounds(data) {
  return data.features.reduce((bounds, feature) => {
    const featureBounds = getFeatureBounds(feature);

    return {
      minLng: Math.min(bounds.minLng, featureBounds.minLng),
      minLat: Math.min(bounds.minLat, featureBounds.minLat),
      maxLng: Math.max(bounds.maxLng, featureBounds.maxLng),
      maxLat: Math.max(bounds.maxLat, featureBounds.maxLat)
    };
  }, {
    minLng: Infinity,
    minLat: Infinity,
    maxLng: -Infinity,
    maxLat: -Infinity
  });
}

function fitMapToBoundingBox() {
  fetch("bounding Box.geojson")
    .then(response => response.json())
    .then(data => {
      const bounds = getGeoJsonBounds(data);
      map.fitBounds({
        north: bounds.maxLat,
        south: bounds.minLat,
        east: bounds.maxLng,
        west: bounds.minLng
      });
    });
}

function openFrameExport() {
  const printUrl = new URL(window.location.href);
  printUrl.searchParams.set("print", "1");
  window.open(printUrl.toString(), "_blank", "noopener,noreferrer");
}

function setPrintFrameDate() {
  const dateElement = document.getElementById("frameDate");
  if (!dateElement) return;

  const currentDate = new Date().toLocaleDateString(undefined, {
    year: "numeric",
    month: "long",
    day: "numeric"
  });

function initFrameAdjustables() {
  const panel = document.querySelector(".frame-title-panel");
  if (!panel) return;

  document.querySelectorAll(".frame-title-panel .frame-adjustable").forEach(element => {
    const id = element.dataset.frameId;
    if (!id) return;

    const saved = getFrameAdjustment(id);
    const defaultRotate = Number(element.dataset.defaultRotate || -90);

    element.style.setProperty("--frame-rotate", `${saved?.rotate ?? defaultRotate}deg`);
    element.style.setProperty("--frame-scale", saved?.scale ?? 1);

    // Convert bottom-positioned elements, such as the logo image, into top/left
    // positioning so dragging is predictable.
    const startLeft = saved?.left ?? element.offsetLeft;
    const startTop = saved?.top ?? element.offsetTop;

    element.style.left = `${startLeft}px`;
    element.style.top = `${startTop}px`;
    element.style.right = "auto";
    element.style.bottom = "auto";

    addFrameElementHandles(element, id);
  });
}

function getFrameAdjustment(id) {
  try {
    const saved = JSON.parse(localStorage.getItem("gwrFrameAdjustments") || "{}");
    return saved[id] || null;
  }
  catch {
    return null;
  }
}

function saveFrameAdjustment(id, element) {
  try {
    const saved = JSON.parse(localStorage.getItem("gwrFrameAdjustments") || "{}");
    saved[id] = {
      left: parseFloat(element.style.left || element.offsetLeft || 0),
      top: parseFloat(element.style.top || element.offsetTop || 0),
      scale: Number(element.style.getPropertyValue("--frame-scale") || 1),
      rotate: parseFloat((element.style.getPropertyValue("--frame-rotate") || "-90deg").replace("deg", ""))
    };
    localStorage.setItem("gwrFrameAdjustments", JSON.stringify(saved));
  }
  catch {
    // If localStorage is blocked, the frame element will still move during the current session.
  }
}

function addFrameElementHandles(element, id) {
  if (!element.querySelector(".frame-resize-handle")) {
    ["nw", "ne", "sw", "se"].forEach(corner => {
      const resizeHandle = document.createElement("span");
      resizeHandle.className = `frame-resize-handle ${corner}`;
      element.appendChild(resizeHandle);
      enableFrameResize(element, resizeHandle, id, corner);
    });
  }

  if (!element.querySelector(".frame-rotate-handle")) {
    const rotateHandle = document.createElement("span");
    rotateHandle.className = "frame-rotate-handle";
    element.appendChild(rotateHandle);
    enableFrameRotate(element, rotateHandle, id);
  }

  enableFrameDrag(element, id);
}

function enableFrameDrag(element, id) {
  element.addEventListener("mousedown", event => {
    if (event.target.classList.contains("frame-resize-handle") || event.target.classList.contains("frame-rotate-handle")) return;

    event.preventDefault();
    event.stopPropagation();

    const startMouse = { x: event.clientX, y: event.clientY };
    const startLeft = parseFloat(element.style.left || element.offsetLeft || 0);
    const startTop = parseFloat(element.style.top || element.offsetTop || 0);

    const move = moveEvent => {
      element.style.left = `${startLeft + moveEvent.clientX - startMouse.x}px`;
      element.style.top = `${startTop + moveEvent.clientY - startMouse.y}px`;
    };

    const up = () => {
      saveFrameAdjustment(id, element);
      document.removeEventListener("mousemove", move);
      document.removeEventListener("mouseup", up);
    };

    document.addEventListener("mousemove", move);
    document.addEventListener("mouseup", up);
  });
}

function enableFrameResize(element, handle, id, corner) {
  handle.addEventListener("mousedown", event => {
    event.preventDefault();
    event.stopPropagation();

    const startMouse = { x: event.clientX, y: event.clientY };
    const startScale = Number(element.style.getPropertyValue("--frame-scale") || 1);

    const move = moveEvent => {
      const dx = moveEvent.clientX - startMouse.x;
      const dy = moveEvent.clientY - startMouse.y;
      const dragDistance = Math.hypot(dx, dy);
      const direction = corner === "nw" || corner === "sw"
        ? Math.sign(startMouse.x - moveEvent.clientX)
        : Math.sign(moveEvent.clientX - startMouse.x);
      const nextScale = Math.max(0.15, Math.min(5, startScale + (direction || 1) * dragDistance / 180));

      element.style.setProperty("--frame-scale", Number(nextScale.toFixed(3)));
    };

    const up = () => {
      saveFrameAdjustment(id, element);
      document.removeEventListener("mousemove", move);
      document.removeEventListener("mouseup", up);
    };

    document.addEventListener("mousemove", move);
    document.addEventListener("mouseup", up);
  });
}

function enableFrameRotate(element, handle, id) {
  handle.addEventListener("mousedown", event => {
    event.preventDefault();
    event.stopPropagation();

    const rect = element.getBoundingClientRect();
    const center = {
      x: rect.left + rect.width / 2,
      y: rect.top + rect.height / 2
    };

    const move = moveEvent => {
      const radians = Math.atan2(moveEvent.clientY - center.y, moveEvent.clientX - center.x);
      const degrees = Math.round(radians * 180 / Math.PI + 90);

      element.style.setProperty("--frame-rotate", `${degrees}deg`);
    };

    const up = () => {
      saveFrameAdjustment(id, element);
      document.removeEventListener("mousemove", move);
      document.removeEventListener("mouseup", up);
    };

    document.addEventListener("mousemove", move);
    document.addEventListener("mouseup", up);
  });
}

function resetFrameAdjustments() {
  localStorage.removeItem("gwrFrameAdjustments");
  window.location.reload();
}


function normalizePoint(position) {
  if (typeof position.lat === "function") {
    return {
      lat: position.lat(),
      lng: position.lng()
    };
  }

  return {
    lat: position.lat,
    lng: position.lng
  };
}

function addHtmlMapLabel(position, html, className = "", options = {}) {
  const overlay = new google.maps.OverlayView();
  let labelPosition = normalizePoint(position);
  let labelScale = options.scale || 1;
  let div;

  overlay.onAdd = function() {
    div = document.createElement("div");
    div.className = `map-label ${className} ${options.draggable ? "adjustable" : ""}`.trim();
    div.innerHTML = html;
    div.style.setProperty("--label-scale", labelScale);
    div.title = options.draggable ? "Drag to move this label" : "";

    if (options.draggable) {
      enableLabelDragging(overlay, div, position => {
        labelPosition = position;
        overlay.draw();
        if (options.onPositionChanged) options.onPositionChanged(position);
      });
    }

    if (options.resizable) {
      addResizeHandles(div, scale => {
        labelScale = scale;
        div.style.setProperty("--label-scale", labelScale);
        if (options.onScaleChanged) options.onScaleChanged(labelScale);
      }, labelScale);
    }

    this.getPanes().floatPane.appendChild(div);
  };

  overlay.draw = function() {
    const projection = this.getProjection();
    if (!projection) return;

    const point = projection.fromLatLngToDivPixel(new google.maps.LatLng(labelPosition.lat, labelPosition.lng));

    if (!point || !div) return;
    div.style.left = `${point.x}px`;
    div.style.top = `${point.y}px`;
  };

  overlay.onRemove = function() {
    if (div) div.remove();
  };

  overlay.setMap(map);
  return overlay;
}

function addResizeHandles(element, onResize, initialScale) {
  ["nw", "ne", "sw", "se"].forEach(corner => {
    const handle = document.createElement("span");
    handle.className = `resize-handle ${corner}`;
    element.appendChild(handle);

    handle.addEventListener("mousedown", event => {
      event.preventDefault();
      event.stopPropagation();

      const startMouse = { x: event.clientX, y: event.clientY };
      const startScale = initialScale;

      map.setOptions({ draggable: false });

      const move = moveEvent => {
        const dragDistance = Math.hypot(moveEvent.clientX - startMouse.x, moveEvent.clientY - startMouse.y);
        const direction = corner === "nw" || corner === "sw"
          ? Math.sign(startMouse.x - moveEvent.clientX)
          : Math.sign(moveEvent.clientX - startMouse.x);
        const nextScale = Math.max(0.45, Math.min(2.5, startScale + direction * dragDistance / 180));

        onResize(Number(nextScale.toFixed(3)));
      };

      const up = () => {
        initialScale = parseFloat(element.style.getPropertyValue("--label-scale")) || initialScale;
        map.setOptions({ draggable: true });
        document.removeEventListener("mousemove", move);
        document.removeEventListener("mouseup", up);
      };

      document.addEventListener("mousemove", move);
      document.addEventListener("mouseup", up);
    });
  });
}

function enableLabelDragging(overlay, element, onMove) {
  element.addEventListener("mousedown", event => {
    event.preventDefault();
    event.stopPropagation();

    const projection = overlay.getProjection();
    const startMouse = { x: event.clientX, y: event.clientY };
    const startLeft = parseFloat(element.style.left || "0");
    const startTop = parseFloat(element.style.top || "0");

    map.setOptions({ draggable: false });

    const move = moveEvent => {
      const point = new google.maps.Point(
        startLeft + moveEvent.clientX - startMouse.x,
        startTop + moveEvent.clientY - startMouse.y
      );
      const latLng = projection.fromDivPixelToLatLng(point);

      onMove(normalizePoint(latLng));
    };

    const up = () => {
      map.setOptions({ draggable: true });
      document.removeEventListener("mousemove", move);
      document.removeEventListener("mouseup", up);
    };

    document.addEventListener("mousemove", move);
    document.addEventListener("mouseup", up);
  });
}

function addCallout(labelPosition, targetPosition, html, className = "callout", id = null) {
  const savedPositions = getSavedCalloutPositions(id);
  let labelScale = 1;

  if (savedPositions) {
    labelPosition = savedPositions.label || labelPosition;
    targetPosition = savedPositions.target || targetPosition;
    labelScale = savedPositions.scale || labelScale;
  }

  let labelPoint = normalizePoint(labelPosition);
  let targetPoint = normalizePoint(targetPosition);

  const leader = new google.maps.Polyline({
    path: [labelPoint, targetPoint],
    map: map,
    strokeColor: "#1f2933",
    strokeOpacity: 0.85,
    strokeWeight: 1.5,
    clickable: false,
    zIndex: LAYER_Z_INDEX.exhibit + 40,
    icons: [{
      icon: {
        path: google.maps.SymbolPath.FORWARD_CLOSED_ARROW,
        scale: 3,
        strokeColor: "#1f2933",
        fillColor: "#1f2933",
        fillOpacity: 0.9
      },
      offset: "100%"
    }]
  });

  const targetHandle = new google.maps.Marker({
    position: targetPoint,
    map: map,
    draggable: true,
    title: "Drag to move the arrow tip",
    icon: {
      path: google.maps.SymbolPath.CIRCLE,
      scale: 5,
      fillColor: "#1f2933",
      fillOpacity: 0.85,
      strokeColor: "#FFFFFF",
      strokeOpacity: 1,
      strokeWeight: 1.5
    },
    zIndex: LAYER_Z_INDEX.exhibit + 50
  });

  targetHandle.addListener("drag", event => {
    targetPoint = normalizePoint(event.latLng);
    leader.setPath([labelPoint, targetPoint]);
    saveCalloutPositions(id, labelPoint, targetPoint);
  });

  return addHtmlMapLabel(labelPoint, html, className, {
    draggable: true,
    resizable: true,
    scale: labelScale,
    onPositionChanged: position => {
      labelPoint = normalizePoint(position);
      leader.setPath([labelPoint, targetPoint]);
      saveCalloutPositions(id, labelPoint, targetPoint);
    },
    onScaleChanged: scale => {
      saveCalloutScale(id, scale);
    }
  });
}

function addAdjustableMapFurniture(id, position, html, className) {
  const saved = getSavedPositions(FURNITURE_STORAGE_KEY, id);
  const startPosition = saved?.position || saved || position;
  const startScale = saved?.scale || 1;

  const saveFurniture = (nextPosition = startPosition, nextScale = startScale) => {
    savePositions(FURNITURE_STORAGE_KEY, id, {
      position: normalizePoint(nextPosition),
      scale: nextScale
    });
  };

  return addHtmlMapLabel(startPosition, html, className, {
    draggable: true,
    resizable: true,
    scale: startScale,
    onPositionChanged: newPosition => {
      const savedNow = getSavedPositions(FURNITURE_STORAGE_KEY, id);
      saveFurniture(newPosition, savedNow?.scale || startScale);
    },
    onScaleChanged: scale => {
      const savedNow = getSavedPositions(FURNITURE_STORAGE_KEY, id);
      saveFurniture(savedNow?.position || startPosition, scale);
    }
  });
}

function getVerticalIntersections(ring, lng) {
  const intersections = [];

  for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
    const [lng1, lat1] = ring[j];
    const [lng2, lat2] = ring[i];
    const crossesLongitude = (lng1 <= lng && lng < lng2) || (lng2 <= lng && lng < lng1);

    if (crossesLongitude) {
      const ratio = (lng - lng1) / (lng2 - lng1);
      intersections.push(lat1 + ratio * (lat2 - lat1));
    }
  }

  return intersections.sort((first, second) => first - second);
}

function getRoadWidthSamples(feature) {
  const bounds = getFeatureBounds(feature);
  const samples = [];

  for (let index = 1; index <= 5; index++) {
    const lng = bounds.minLng + (bounds.maxLng - bounds.minLng) * index / 6;

    getFeatureRings(feature).forEach(ring => {
      const intersections = getVerticalIntersections(ring, lng);

      for (let pair = 0; pair + 1 < intersections.length; pair += 2) {
        const startLat = intersections[pair];
        const endLat = intersections[pair + 1];
        const feet = Math.round((endLat - startLat) * 364000);

        if (feet <= 0) continue;
        samples.push({
          lng: lng,
          startLat: startLat,
          endLat: endLat,
          feet: feet
        });
      }
    });
  }

  return samples;
}

function addRoadWidthMeasurements() {

function shouldLabelFeature(feature, fieldName, options) {
  const labelText = String(feature.properties[fieldName] || "");
  const minArea = options.minAreaByLabel?.[labelText];

  if (!labelText) return false;
  if (getFeatureRings(feature).length === 0) return false;
  if (minArea && getFeatureLabelArea(feature) < minArea) return false;

  return true;
}

function labelGroupedPolygons(features, fieldName, options) {
  const maxGroupGap = options.maxGroupGap ?? 0.0003;
  const labelFeatures = features
    .filter(feature => shouldLabelFeature(feature, fieldName, options))
    .map((feature, index) => ({
      feature: feature,
      index: index,
      labelText: String(feature.properties[fieldName] || ""),
      bounds: getFeatureBounds(feature),
      center: getFeatureLabelCenter(feature),
      area: getFeatureLabelArea(feature)
    }));

  const parents = labelFeatures.map((_, index) => index);
  const find = index => parents[index] === index ? index : parents[index] = find(parents[index]);
  const union = (first, second) => parents[find(second)] = find(first);

  for (let i = 0; i < labelFeatures.length; i++) {
    for (let j = i + 1; j < labelFeatures.length; j++) {
      if (labelFeatures[i].labelText !== labelFeatures[j].labelText) continue;
      if (getBoundsGap(labelFeatures[i].bounds, labelFeatures[j].bounds) <= maxGroupGap) {
        union(i, j);
      }
    }
  }

  const groups = new Map();

  labelFeatures.forEach((item, index) => {
    const groupId = find(index);
    const group = groups.get(groupId) || {
      labelText: item.labelText,
      totalArea: 0,
      lng: 0,
      lat: 0
    };

    group.totalArea += item.area;
    group.lng += item.center.lng * item.area;
    group.lat += item.center.lat * item.area;
    groups.set(groupId, group);
  });

  groups.forEach(group => {
    addMapLabel(group.labelText, {
      lng: group.lng / group.totalArea,
      lat: group.lat / group.totalArea
    });
  });
}

function labelPolygonsByField(fileName, fieldName, options = {}) {
  fetch(fileName)
    .then(response => response.json())
    .then(data => {
      if (options.groupNearbyByLabel) {
        labelGroupedPolygons(data.features, fieldName, options);
        return;
      }

      data.features.forEach(feature => {
        if (!shouldLabelFeature(feature, fieldName, options)) return;
        addMapLabel(String(feature.properties[fieldName] || ""), getFeatureLabelCenter(feature));
      });

    });
}

    disableDefaultUI: IS_PRINT_VIEW,
    clickableIcons: !IS_PRINT_VIEW,
    gestureHandling: IS_PRINT_VIEW ? "none" : "auto",
    tilt: 0
  });

  if (IS_PRINT_VIEW) {
    setPrintFrameDate();
    initFrameAdjustables();
  }

  roadsInfoWindow = new google.maps.InfoWindow();
  map.addListener("click", clearRoadSelection);

loadLayer("city.geojson", {
  strokeColor: "#FF0000",
  strokeWeight: 5,
  strokeOpacity: 1,
  fillOpacity: 0,
  zIndex: LAYER_Z_INDEX.city
});
  
  loadLayer("ARA.geojson", {
    strokeColor: "#00FFFF",
    strokeOpacity: 0,
    strokeWeight: 0,
    fillColor: "#00FFFF",
    fillOpacity: 0.45
  });

  loadLayer("RWS.geojson", {
    strokeColor: "#00FFFF",
    strokeOpacity: 0,
    strokeWeight: 0,
    fillColor: "#00FFFF",
    fillOpacity: 0.45
  });

loadAlaiaLayer();
labelPolygonsByField("alaia.geojson", "landusecode", {
  minAreaByLabel: {
    CCOM: 0.0000001
  }
});
  loadGLWLongValleyLayer();
  labelGLWLongValleyLayer();

  loadLayer("Long_Valley_trails.geojson", {
    strokeColor: "#FFA500",
    strokeWeight: 3,
    fillOpacity: 0
  });

  if (!IS_PRINT_VIEW) {
    loadLayer("bounding Box.geojson", {
      strokeColor: "#FFFFFF",
      strokeWeight: 3,
      fillOpacity: 0
    });
  }

  loadCommercialLayer();
  labelPolygonsByField("commercial.geojson", "landusecode", {
    groupNearbyByLabel: true,
    maxGroupGap: 0.0003
  });

  loadFutureGWB();

  loadRoadsLayer();
  loadExhibitAnnotations();
}

function loadLayer(fileName, styleOptions) {
  const layer = new google.maps.Data();

  layer.loadGeoJson(fileName);

  const style = {
    strokeColor: styleOptions.strokeColor || "#FFFFFF",
    strokeOpacity: styleOptions.strokeOpacity ?? 1,
    strokeWeight: styleOptions.strokeWeight || 3,
    fillColor: styleOptions.fillColor || styleOptions.strokeColor || "#FFFFFF",
    fillOpacity: styleOptions.fillOpacity ?? 0,
    zIndex: styleOptions.zIndex ?? LAYER_Z_INDEX.default,
    clickable: styleOptions.clickable ?? false
  };

  layer.setStyle(style);
  layer.setMap(map);
  return layer;
}

function loadAlaiaLayer() {

  const layer = new google.maps.Data();

  layer.loadGeoJson("alaia.geojson");

  layer.setStyle(function(feature) {

    const code = feature.getProperty("landusecode");

    let fillColor = "#FFFFFF";

    switch (code) {

      case "CCOM":
        fillColor = "#E60000";
        break;

      case "LD":
        fillColor = "#FCFBD2";
        break;

      case "P":
        fillColor = "#00734C";
        break;

      case "VLD":
        fillColor = "#D3FFBE";
        break;

    }

    return {
      strokeColor: "#000000",
      strokeWeight: 2,
      strokeOpacity: 1,
      fillColor: fillColor,
      fillOpacity: 0.65,
      zIndex: LAYER_Z_INDEX.default,
      clickable: false
    };
  });

  layer.setMap(map);
}

function loadGLWLongValleyLayer() {
  const layer = new google.maps.Data();

  layer.loadGeoJson("GLW_Long_Valley_trails.geojson");

  layer.setStyle(function(feature) {
    const landuseCode = feature.getProperty("landusecode");
    const color = LAND_USE_COLORS[landuseCode] || "#FFFFFF";

    return {
      strokeColor: landuseCode === "OS" ? "#8FB07B" : "#000000",
      strokeWeight: 2,
      strokeOpacity: 1,
      fillColor: color,
      fillOpacity: landuseCode === "OS" ? 0.45 : 0.65,
      zIndex: LAYER_Z_INDEX.default,
      clickable: false
    };
  });

  layer.setMap(map);

  fetch("GLW_Long_Valley_trails.geojson")
    .then(response => response.json())
    .then(data => {
      data.features
        .filter(feature => feature.properties.landusecode === "OS")
        .forEach(addOpenSpaceHatch);
    });
}

function labelGLWLongValleyLayer() {
  Promise.all([
    fetch("GLW_Long_Valley_trails.geojson").then(response => response.json()),
    fetch("bounding Box.geojson").then(response => response.json())
  ]).then(([glwData, boundsData]) => {
    const printBounds = getGeoJsonBounds(boundsData);

    glwData.features.forEach(feature => {
      if (!shouldLabelFeature(feature, "landusecode", {})) return;

      const labelText = String(feature.properties.landusecode || "");
      let center = getFeatureCenterInsideBounds(feature, printBounds) || getFeatureLabelCenter(feature);

      if (labelText === "LD") {
        center = getFeaturePointNearTargetInsideBounds(feature, printBounds, {
          lng: printBounds.maxLng - 0.00165,
          lat: center.lat
        }) || center;
      }

      addMapLabel(labelText, center);
    });
  });
}

function loadRoadsLayer() {
  const layer = new google.maps.Data();

  layer.loadGeoJson("roads.geojson");

  layer.setStyle(function(feature) {
    const phaseStyle = getRoadPhaseStyle(getRoadPhase(feature.getProperty("objectid")));

    if (phaseStyle) return phaseStyle;

    const surfaceType = feature.getProperty("surftype");

    let color = "#9C9C9C";

    if (surfaceType === "Concrete") {
      color = "#E1E1E1";
    }

    return {
      strokeColor: color,
      strokeWeight: 3,
      strokeOpacity: 1,
      fillColor: color,
      fillOpacity: 1,
      zIndex: LAYER_Z_INDEX.roads,
      clickable: true
    };
  });
  roadsLayer = layer;
  layer.setMap(map);

  layer.addListener("click", function(event) {
    event.stop();
    highlightRoadFeature(event.feature);
    showRoadPopup(event.feature, event.latLng);
  });
}

function clearRoadSelection() {
  if (selectedRoadFeature) {
    roadsLayer.revertStyle(selectedRoadFeature);
    selectedRoadFeature = null;
  }

  roadsInfoWindow.close();
}

function highlightRoadFeature(feature) {
  if (selectedRoadFeature) {
    roadsLayer.revertStyle(selectedRoadFeature);
  }

  selectedRoadFeature = feature;
  roadsLayer.overrideStyle(feature, {
    strokeColor: "#00FFFF",
    strokeOpacity: 1,
    strokeWeight: 6,
    fillOpacity: 1,
    zIndex: LAYER_Z_INDEX.exhibit + 30
  });
}

function showRoadPopup(feature, position) {
  const objectId = feature.getProperty("objectid");
  const globalId = feature.getProperty("globalid");
  const surfaceType = feature.getProperty("surftype") || "Unknown";

  roadsInfoWindow.setContent(`
    <div style="font-family: Arial, sans-serif; font-size: 12px; line-height: 1.4;">
      <strong>Road Feature</strong><br>
      Object ID: ${objectId}<br>
      Global ID: ${globalId}<br>
      Surface: ${surfaceType}
    </div>
  `);
  roadsInfoWindow.setPosition(position);
  roadsInfoWindow.open(map);
}

function loadCommercialLayer() {
  const layer = new google.maps.Data();

  layer.loadGeoJson("commercial.geojson");

  layer.setStyle(function(feature) {
    const landuseCode = feature.getProperty("landusecode");
    const color = landuseCode === "NCOM" ? "#C84F4F" : "#E60000";

    return {
      strokeColor: color,
      strokeWeight: 2,
      strokeOpacity: 1,
      fillColor: color,
      fillOpacity: 0.55,
      zIndex: LAYER_Z_INDEX.default,
      clickable: false
    };
  });

  layer.setMap(map);
}

function loadFutureGWB() {
  const layer = new google.maps.Data();

  layer.loadGeoJson("futureGWB.geojson", null, function(features) {
    // Longer feature = red, shorter feature = blue
    features.forEach((feature, index) => {
      feature.setProperty("gwbColor", index === 0 ? "#E60000" : "#0000FF");
    });
  });

  layer.setStyle(function(feature) {
    return {
      strokeColor: "#F97316",
      strokeOpacity: 1,
      strokeWeight: 5,
      fillColor: "#F97316",
      fillOpacity: 0.65,
      zIndex: LAYER_Z_INDEX.exhibit,
      clickable: false
    };
  });

  layer.setMap(map);
}
</script>

<script async
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBLQdEBPkVAA460UQu0tla8lJuOJQew_Tc&callback=initMap">
</script>
