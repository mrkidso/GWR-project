<!DOCTYPE html>
<html>
<head>
  <title>GWR Project</title>
  <meta charset="utf-8" />
  <style>
    html, body, #map {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
    }
  </style>
</head>
<body>
<div id="map"></div>

<script>
let map;
let roadsLayer;

const LAYER_Z_INDEX = {
  default: 10,
  roads: 90,
  city: 100
};

function getPolygonArea(coords) {
  let area = 0;

  for (let i = 0, j = coords.length - 1; i < coords.length; j = i++) {
    const [lng1, lat1] = coords[j];
    const [lng2, lat2] = coords[i];
    area += lng1 * lat2 - lng2 * lat1;
  }

  return Math.abs(area / 2);
}

function getPolygonCenter(coords) {
  let area = 0;
  let lngSum = 0;
  let latSum = 0;

  for (let i = 0, j = coords.length - 1; i < coords.length; j = i++) {
    const [lng1, lat1] = coords[j];
    const [lng2, lat2] = coords[i];
    const cross = lng1 * lat2 - lng2 * lat1;

    area += cross;
    lngSum += (lng1 + lng2) * cross;
    latSum += (lat1 + lat2) * cross;
  }

  if (area === 0) {
    const center = coords.reduce((total, coord) => {
      total.lng += coord[0];
      total.lat += coord[1];
      return total;
    }, { lng: 0, lat: 0 });

    return {
      lng: center.lng / coords.length,
      lat: center.lat / coords.length,
      area: 0
    };
  }

  return {
    lng: lngSum / (3 * area),
    lat: latSum / (3 * area),
    area: Math.abs(area / 2)
  };
}

function getFeatureRings(feature) {
  if (!feature.geometry) return [];

  if (feature.geometry.type === "Polygon") {
    return [feature.geometry.coordinates[0]];
  }

  if (feature.geometry.type === "MultiPolygon") {
    return feature.geometry.coordinates.map(polygon => polygon[0]);
  }

  return [];
}

function getFeatureLabelArea(feature) {
  return getFeatureRings(feature).reduce((total, coords) => {
    return total + getPolygonArea(coords);
  }, 0);
}

function getFeatureLabelCenter(feature) {
  const centers = getFeatureRings(feature).map(getPolygonCenter);
  const totalArea = centers.reduce((total, center) => total + center.area, 0);

  if (totalArea > 0) {
    return centers.reduce((total, center) => {
      total.lng += center.lng * center.area / totalArea;
      total.lat += center.lat * center.area / totalArea;
      return total;
    }, { lng: 0, lat: 0 });
  }

  return centers.reduce((total, center) => {
    total.lng += center.lng / centers.length;
    total.lat += center.lat / centers.length;
    return total;
  }, { lng: 0, lat: 0 });
}

function getFeatureBounds(feature) {
  return getFeatureRings(feature).flat().reduce((bounds, coord) => {
    const [lng, lat] = coord;

    return {
      minLng: Math.min(bounds.minLng, lng),
      minLat: Math.min(bounds.minLat, lat),
      maxLng: Math.max(bounds.maxLng, lng),
      maxLat: Math.max(bounds.maxLat, lat)
    };
  }, {
    minLng: Infinity,
    minLat: Infinity,
    maxLng: -Infinity,
    maxLat: -Infinity
  });
}

function getBoundsGap(first, second) {
  const lngGap = Math.max(0, first.minLng - second.maxLng, second.minLng - first.maxLng);
  const latGap = Math.max(0, first.minLat - second.maxLat, second.minLat - first.maxLat);

  return Math.hypot(lngGap, latGap);
}

function addMapLabel(text, center) {
  new google.maps.Marker({
    position: center,
    map: map,
    icon: {
      path: google.maps.SymbolPath.CIRCLE,
      scale: 0
    },
    label: {
      text: text,
      color: "#000000",
      fontSize: "12px",
      fontWeight: "bold"
    }
  });
}

function shouldLabelFeature(feature, fieldName, options) {
  const labelText = String(feature.properties[fieldName] || "");
  const minArea = options.minAreaByLabel?.[labelText];

  if (!labelText) return false;
  if (getFeatureRings(feature).length === 0) return false;
  if (minArea && getFeatureLabelArea(feature) < minArea) return false;

  return true;
}

function labelGroupedPolygons(features, fieldName, options) {
  const maxGroupGap = options.maxGroupGap ?? 0.0003;
  const labelFeatures = features
    .filter(feature => shouldLabelFeature(feature, fieldName, options))
    .map((feature, index) => ({
      feature: feature,
      index: index,
      labelText: String(feature.properties[fieldName] || ""),
      bounds: getFeatureBounds(feature),
      center: getFeatureLabelCenter(feature),
      area: getFeatureLabelArea(feature)
    }));

  const parents = labelFeatures.map((_, index) => index);
  const find = index => parents[index] === index ? index : parents[index] = find(parents[index]);
  const union = (first, second) => parents[find(second)] = find(first);

  for (let i = 0; i < labelFeatures.length; i++) {
    for (let j = i + 1; j < labelFeatures.length; j++) {
      if (labelFeatures[i].labelText !== labelFeatures[j].labelText) continue;
      if (getBoundsGap(labelFeatures[i].bounds, labelFeatures[j].bounds) <= maxGroupGap) {
        union(i, j);
      }
    }
  }

  const groups = new Map();

  labelFeatures.forEach((item, index) => {
    const groupId = find(index);
    const group = groups.get(groupId) || {
      labelText: item.labelText,
      totalArea: 0,
      lng: 0,
      lat: 0
    };

    group.totalArea += item.area;
    group.lng += item.center.lng * item.area;
    group.lat += item.center.lat * item.area;
    groups.set(groupId, group);
  });

  groups.forEach(group => {
    addMapLabel(group.labelText, {
      lng: group.lng / group.totalArea,
      lat: group.lat / group.totalArea
    });
  });
}

function labelPolygonsByField(fileName, fieldName, options = {}) {
  fetch(fileName)
    .then(response => response.json())
    .then(data => {
      if (options.groupNearbyByLabel) {
        labelGroupedPolygons(data.features, fieldName, options);
        return;
      }

      data.features.forEach(feature => {
        if (!shouldLabelFeature(feature, fieldName, options)) return;
        addMapLabel(String(feature.properties[fieldName] || ""), getFeatureLabelCenter(feature));
      });

    });
}
  
function initMap() {
  map = new google.maps.Map(document.getElementById("map"), {
    center: { lat: 37.13, lng: -113.48 },
    zoom: 13,
    mapTypeId: "satellite",
    disableDefaultUI: false,
    tilt: 0
  });

loadLayer("city.geojson", {
  strokeColor: "#FF0000",
  strokeWeight: 5,
  strokeOpacity: 1,
  fillOpacity: 0,
  zIndex: LAYER_Z_INDEX.city
});
  
  loadLayer("ARA.geojson", {
    strokeColor: "#00FFFF",
    strokeWeight: 3,
    fillOpacity: 0
  });

  loadLayer("RWS.geojson", {
    strokeColor: "#FFFF00",
    strokeWeight: 3,
    fillOpacity: 0
  });

loadAlaiaLayer();
labelPolygonsByField("alaia.geojson", "landusecode", {
  minAreaByLabel: {
    CCOM: 0.0000001
  }
});
  loadLayer("GLW_Long_Valley_trails.geojson", {
    strokeColor: "#00FF00",
    strokeWeight: 3,
    fillOpacity: 0
  });

  loadLayer("Long_Valley_trails.geojson", {
    strokeColor: "#FFA500",
    strokeWeight: 3,
    fillOpacity: 0
  });

  loadLayer("bounding Box.geojson", {
    strokeColor: "#FFFFFF",
    strokeWeight: 3,
    fillOpacity: 0
  });

  loadCommercialLayer();
  labelPolygonsByField("commercial.geojson", "landusecode", {
    groupNearbyByLabel: true,
    maxGroupGap: 0.0003
  });

  loadFutureGWB();

  loadRoadsLayer();
}

function loadLayer(fileName, styleOptions) {
  const layer = new google.maps.Data();

  layer.loadGeoJson(fileName);

  const style = {
    strokeColor: styleOptions.strokeColor || "#FFFFFF",
    strokeOpacity: styleOptions.strokeOpacity ?? 1,
    strokeWeight: styleOptions.strokeWeight || 3,
    fillColor: styleOptions.fillColor || styleOptions.strokeColor || "#FFFFFF",
    fillOpacity: styleOptions.fillOpacity ?? 0,
    zIndex: styleOptions.zIndex ?? LAYER_Z_INDEX.default
  };

  layer.setStyle(style);
  layer.setMap(map);
  return layer;
}

function loadAlaiaLayer() {

  const layer = new google.maps.Data();

  layer.loadGeoJson("alaia.geojson");

  layer.setStyle(function(feature) {

    const code = feature.getProperty("landusecode");

    let fillColor = "#FFFFFF";

    switch (code) {

      case "CCOM":
        fillColor = "#E60000";
        break;

      case "LD":
        fillColor = "#FCFBD2";
        break;

      case "P":
        fillColor = "#00734C";
        break;

      case "VLD":
        fillColor = "#D3FFBE";
        break;

    }

    return {
      strokeColor: "#000000",
      strokeWeight: 2,
      strokeOpacity: 1,
      fillColor: fillColor,
      fillOpacity: 0.65,
      zIndex: LAYER_Z_INDEX.default
    };
  });

  layer.setMap(map);
}

function loadRoadsLayer() {
  const layer = new google.maps.Data();

  layer.loadGeoJson("roads.geojson");

  layer.setStyle(function(feature) {
    const surfaceType = feature.getProperty("surftype");

    let color = "#9C9C9C";

    if (surfaceType === "Concrete") {
      color = "#E1E1E1";
    }

    return {
      strokeColor: color,
      strokeWeight: 3,
      strokeOpacity: 1,
      fillColor: color,
      fillOpacity: 1,
      zIndex: LAYER_Z_INDEX.roads
    };
  });
  roadsLayer = layer;
  layer.setMap(map);
}

function loadCommercialLayer() {
  const layer = new google.maps.Data();

  layer.loadGeoJson("commercial.geojson");

  layer.setStyle(function(feature) {
    const landuseCode = feature.getProperty("landusecode");
    const color = landuseCode === "NCOM" ? "#C84F4F" : "#E60000";

    return {
      strokeColor: color,
      strokeWeight: 2,
      strokeOpacity: 1,
      fillColor: color,
      fillOpacity: 0.55,
      zIndex: LAYER_Z_INDEX.default
    };
  });

  layer.setMap(map);
}

function loadFutureGWB() {
  const layer = new google.maps.Data();

  layer.loadGeoJson("futureGWB.geojson", null, function(features) {
    // Longer feature = red, shorter feature = blue
    features.forEach((feature, index) => {
      feature.setProperty("gwbColor", index === 0 ? "#E60000" : "#0000FF");
    });
  });

  layer.setStyle(function(feature) {
    return {
      strokeColor: feature.getProperty("gwbColor") || "#E60000",
      strokeOpacity: 1,
      strokeWeight: 5,
      fillColor: feature.getProperty("gwbColor") || "#E60000",
      fillOpacity: 0.55,
      zIndex: LAYER_Z_INDEX.default
    };
  });

  layer.setMap(map);
}
</script>

<script async
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBLQdEBPkVAA460UQu0tla8lJuOJQew_Tc&callback=initMap">
</script>
</body>
</html>
