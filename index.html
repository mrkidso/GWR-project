  return true;
}

function labelGroupedPolygons(features, fieldName, options) {
  const maxGroupGap = options.maxGroupGap ?? 0.0003;
  const labelFeatures = features
    .filter(feature => shouldLabelFeature(feature, fieldName, options))
    .map((feature, index) => ({
      feature: feature,
      index: index,
      labelText: String(feature.properties[fieldName] || ""),
      bounds: getFeatureBounds(feature),
      center: getFeatureLabelCenter(feature),
      area: getFeatureLabelArea(feature)
    }));

  const parents = labelFeatures.map((_, index) => index);
  const find = index => parents[index] === index ? index : parents[index] = find(parents[index]);
  const union = (first, second) => parents[find(second)] = find(first);

  for (let i = 0; i < labelFeatures.length; i++) {
    for (let j = i + 1; j < labelFeatures.length; j++) {
      if (labelFeatures[i].labelText !== labelFeatures[j].labelText) continue;
      if (getBoundsGap(labelFeatures[i].bounds, labelFeatures[j].bounds) <= maxGroupGap) {
        union(i, j);
      }
    }
  }

  const groups = new Map();

  labelFeatures.forEach((item, index) => {
    const groupId = find(index);
    const group = groups.get(groupId) || {
      labelText: item.labelText,
      totalArea: 0,
      lng: 0,
      lat: 0
    };

    group.totalArea += item.area;
    group.lng += item.center.lng * item.area;
    group.lat += item.center.lat * item.area;
    groups.set(groupId, group);
  });

  groups.forEach(group => {
    addMapLabel(group.labelText, {
      lng: group.lng / group.totalArea,
      lat: group.lat / group.totalArea
    });
  });
}

function labelPolygonsByField(fileName, fieldName, options = {}) {
  fetch(fileName)
    .then(response => response.json())
    .then(data => {
      if (options.groupNearbyByLabel) {
        labelGroupedPolygons(data.features, fieldName, options);
        return;
      }

      data.features.forEach(feature => {
        if (!shouldLabelFeature(feature, fieldName, options)) return;
        addMapLabel(String(feature.properties[fieldName] || ""), getFeatureLabelCenter(feature));
      });

    });
}
  
function initMap() {
  map = new google.maps.Map(document.getElementById("map"), {
    center: { lat: 37.13, lng: -113.48 },
    zoom: 13,
    mapTypeId: "satellite",
    isFractionalZoomEnabled: true,
    disableDefaultUI: IS_PRINT_VIEW,
    clickableIcons: !IS_PRINT_VIEW,
    gestureHandling: IS_PRINT_VIEW ? "none" : "auto",
    tilt: 0
  });

  if (IS_PRINT_VIEW) {
    setPrintFrameDate();
    initFrameAdjustables();
    initPhaseInsetAdjustables();
    initPhaseInsetLeaders();
  }

  roadsInfoWindow = new google.maps.InfoWindow();
  map.addListener("click", clearRoadSelection);

loadLayer("city.geojson", {
  strokeColor: "#FF0000",
  strokeWeight: 5,
  strokeOpacity: 1,
  fillOpacity: 0,
  zIndex: LAYER_Z_INDEX.city
});
  
  loadLayer("ARA.geojson", {
    strokeColor: "#00FFFF",
    strokeOpacity: 0,
    strokeWeight: 0,
    fillColor: "#00FFFF",
    fillOpacity: 0.45
  });

  loadLayer("RWS.geojson", {
    strokeColor: "#00FFFF",
    strokeOpacity: 0,
    strokeWeight: 0,
    fillColor: "#00FFFF",
    fillOpacity: 0.45
  });

loadAlaiaLayer();
labelPolygonsByField("alaia.geojson", "landusecode", {
  minAreaByLabel: {
    CCOM: 0.0000001
  }
});
  loadGLWLongValleyLayer();
  labelGLWLongValleyLayer();

  loadLayer("Long_Valley_trails.geojson", {
    strokeColor: "#FFA500",
    strokeWeight: 3,
    fillOpacity: 0
  });

  if (!IS_PRINT_VIEW) {
    loadLayer("bounding Box.geojson", {
      strokeColor: "#FFFFFF",
      strokeWeight: 3,
      fillOpacity: 0
    });
  }

  loadCommercialLayer();
  labelPolygonsByField("commercial.geojson", "landusecode", {
    groupNearbyByLabel: true,
    maxGroupGap: 0.0003
  });

  loadFutureGWB();

  loadRoadsLayer();
  loadExhibitAnnotations();
}

function loadLayer(fileName, styleOptions) {
  const layer = new google.maps.Data();

  layer.loadGeoJson(fileName);

  const style = {
    strokeColor: styleOptions.strokeColor || "#FFFFFF",
    strokeOpacity: styleOptions.strokeOpacity ?? 1,
    strokeWeight: styleOptions.strokeWeight || 3,
    fillColor: styleOptions.fillColor || styleOptions.strokeColor || "#FFFFFF",
    fillOpacity: styleOptions.fillOpacity ?? 0,
    zIndex: styleOptions.zIndex ?? LAYER_Z_INDEX.default,
    clickable: styleOptions.clickable ?? false
  };

  layer.setStyle(style);
  layer.setMap(map);
  return layer;
}

function loadAlaiaLayer() {

  const layer = new google.maps.Data();

  layer.loadGeoJson("alaia.geojson");

  layer.setStyle(function(feature) {

    const code = feature.getProperty("landusecode");

    let fillColor = "#FFFFFF";

    switch (code) {

      case "CCOM":
        fillColor = "#E60000";
        break;

      case "LD":
        fillColor = "#FCFBD2";
        break;

      case "P":
        fillColor = "#00734C";
        break;

      case "VLD":
        fillColor = "#D3FFBE";
        break;

    }

    return {
      strokeColor: "#000000",
      strokeWeight: 2,
      strokeOpacity: 1,
      fillColor: fillColor,
      fillOpacity: 0.65,
      zIndex: LAYER_Z_INDEX.default,
      clickable: false
    };
  });

  layer.setMap(map);
}

function loadGLWLongValleyLayer() {
  const layer = new google.maps.Data();

  layer.loadGeoJson("GLW_Long_Valley_trails.geojson");

  layer.setStyle(function(feature) {
    const landuseCode = feature.getProperty("landusecode");
    const color = LAND_USE_COLORS[landuseCode] || "#FFFFFF";

    return {
      strokeColor: landuseCode === "OS" ? "#8FB07B" : "#000000",
      strokeWeight: 2,
      strokeOpacity: 1,
      fillColor: color,
      fillOpacity: landuseCode === "OS" ? 0.45 : 0.65,
      zIndex: LAYER_Z_INDEX.default,
      clickable: false
    };
  });

  layer.setMap(map);

  fetch("GLW_Long_Valley_trails.geojson")
    .then(response => response.json())
    .then(data => {
      data.features
        .filter(feature => feature.properties.landusecode === "OS")
        .forEach(addOpenSpaceHatch);
    });
}

function labelGLWLongValleyLayer() {
  Promise.all([
    fetch("GLW_Long_Valley_trails.geojson").then(response => response.json()),
    fetch("bounding Box.geojson").then(response => response.json())
  ]).then(([glwData, boundsData]) => {
    const printBounds = getGeoJsonBounds(boundsData);

    glwData.features.forEach(feature => {
      if (!shouldLabelFeature(feature, "landusecode", {})) return;

      const labelText = String(feature.properties.landusecode || "");
      let center = getFeatureCenterInsideBounds(feature, printBounds) || getFeatureLabelCenter(feature);

      if (labelText === "LD") {
        center = getFeaturePointNearTargetInsideBounds(feature, printBounds, {
          lng: printBounds.maxLng - 0.00165,
          lat: center.lat
        }) || center;
      }

      addMapLabel(labelText, center);
    });
  });
}

function loadRoadsLayer() {
  const layer = new google.maps.Data();

  layer.loadGeoJson("roads.geojson");

  layer.setStyle(function(feature) {
    const phaseStyle = getRoadPhaseStyle(getRoadPhase(feature.getProperty("objectid")));

    if (phaseStyle) return phaseStyle;

    const surfaceType = feature.getProperty("surftype");

    let color = "#9C9C9C";

    if (surfaceType === "Concrete") {
      color = "#E1E1E1";
    }

    return {
      strokeColor: color,
      strokeWeight: 3,
      strokeOpacity: 1,
      fillColor: color,
      fillOpacity: 1,
      zIndex: LAYER_Z_INDEX.roads,
      clickable: true
    };
  });
  roadsLayer = layer;
  layer.setMap(map);

  layer.addListener("click", function(event) {
    event.stop();
    highlightRoadFeature(event.feature);
    showRoadPopup(event.feature, event.latLng);
  });
}

function clearRoadSelection() {
  if (selectedRoadFeature) {
    roadsLayer.revertStyle(selectedRoadFeature);
    selectedRoadFeature = null;
  }

  roadsInfoWindow.close();
}

function highlightRoadFeature(feature) {
  if (selectedRoadFeature) {
    roadsLayer.revertStyle(selectedRoadFeature);
  }

  selectedRoadFeature = feature;
  roadsLayer.overrideStyle(feature, {
    strokeColor: "#00FFFF",
    strokeOpacity: 1,
    strokeWeight: 6,
    fillOpacity: 1,
    zIndex: LAYER_Z_INDEX.exhibit + 30
  });
}

function showRoadPopup(feature, position) {
  const objectId = feature.getProperty("objectid");
  const globalId = feature.getProperty("globalid");
  const surfaceType = feature.getProperty("surftype") || "Unknown";

  roadsInfoWindow.setContent(`
    <div style="font-family: Arial, sans-serif; font-size: 12px; line-height: 1.4;">
      <strong>Road Feature</strong><br>
      Object ID: ${objectId}<br>
      Global ID: ${globalId}<br>
      Surface: ${surfaceType}
    </div>
  `);
  roadsInfoWindow.setPosition(position);
  roadsInfoWindow.open(map);
}

function loadCommercialLayer() {
  const layer = new google.maps.Data();

  layer.loadGeoJson("commercial.geojson");

  layer.setStyle(function(feature) {
    const landuseCode = feature.getProperty("landusecode");
    const color = landuseCode === "NCOM" ? "#C84F4F" : "#E60000";

    return {
      strokeColor: color,
      strokeWeight: 2,
      strokeOpacity: 1,
      fillColor: color,
      fillOpacity: 0.55,
      zIndex: LAYER_Z_INDEX.default,
      clickable: false
    };
  });

  layer.setMap(map);
}

function loadFutureGWB() {
  const layer = new google.maps.Data();

  layer.loadGeoJson("futureGWB.geojson", null, function(features) {
    // Longer feature = red, shorter feature = blue
    features.forEach((feature, index) => {
      feature.setProperty("gwbColor", index === 0 ? "#E60000" : "#0000FF");
    });
  });

  layer.setStyle(function(feature) {
    return {
      strokeColor: "#F97316",
      strokeOpacity: 1,
      strokeWeight: 5,
      fillColor: "#F97316",
      fillOpacity: 0.65,
      zIndex: LAYER_Z_INDEX.exhibit,
      clickable: false
    };
  });

  layer.setMap(map);
}
