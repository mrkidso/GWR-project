<!DOCTYPE html>
<html>
<head>
  <title>GWR Project</title>
  <meta charset="utf-8" />
  <style>
    html, body, #map {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
    }
  </style>
</head>
<body>
<div id="map"></div>

<script>
let map;

function labelPolygonsByField(fileName, fieldName) {

  fetch(fileName)
    .then(response => response.json())
    .then(data => {

      data.features.forEach(feature => {

        if (!feature.geometry) return;

        let coords;

        if (feature.geometry.type === "Polygon") {
          coords = feature.geometry.coordinates[0];
        }
        else if (feature.geometry.type === "MultiPolygon") {
          coords = feature.geometry.coordinates[0][0];
        }
        else {
          return;
        }

        let latSum = 0;
        let lngSum = 0;

        coords.forEach(coord => {
          lngSum += coord[0];
          latSum += coord[1];
        });

        const center = {
          lat: latSum / coords.length,
          lng: lngSum / coords.length
        };

        new google.maps.Marker({
          position: center,
          map: map,
          icon: {
            path: google.maps.SymbolPath.CIRCLE,
            scale: 0
          },
          label: {
            text: String(feature.properties[fieldName] || ""),
            color: "#000000",
            fontSize: "12px",
            fontWeight: "bold"
          }
        });

      });

    });
}
  
function initMap() {
  map = new google.maps.Map(document.getElementById("map"), {
    center: { lat: 37.13, lng: -113.48 },
    zoom: 13,
    mapTypeId: "satellite",
    disableDefaultUI: false,
    tilt: 0
  });

loadLayer("city.geojson", {
  strokeColor: "#FF0000",
  strokeWeight: 5,
  strokeOpacity: 1,
  fillOpacity: 0
});
  
  loadLayer("ARA.geojson", {
    strokeColor: "#00FFFF",
    strokeWeight: 3,
    fillOpacity: 0
  });

  loadLayer("RWS.geojson", {
    strokeColor: "#FFFF00",
    strokeWeight: 3,
    fillOpacity: 0
  });

loadAlaiaLayer();
labelPolygonsByField("alaia.geojson", "landusecode");
  loadLayer("GLW_Long_Valley_trails.geojson", {
    strokeColor: "#00FF00",
    strokeWeight: 3,
    fillOpacity: 0
  });

  loadLayer("Long_Valley_trails.geojson", {
    strokeColor: "#FFA500",
    strokeWeight: 3,
    fillOpacity: 0
  });

  loadLayer("bounding Box.geojson", {
    strokeColor: "#FFFFFF",
    strokeWeight: 3,
    fillOpacity: 0
  });

  loadLayer("commercial.geojson", {
    strokeColor: "#E60000",
    strokeWeight: 2,
    fillColor: "#E60000",
    fillOpacity: 0.55
  });

  loadFutureGWB();

  loadLayer("roads.geojson", {
    strokeColor: "#9C9C9C",
    strokeWeight: 3,
    fillColor: "#9C9C9C",
    fillOpacity: 1
  });
}

function loadLayer(fileName, styleOptions) {
  const layer = new google.maps.Data();

  layer.loadGeoJson(fileName);

  const style = {
    strokeColor: styleOptions.strokeColor || "#FFFFFF",
    strokeOpacity: styleOptions.strokeOpacity ?? 1,
    strokeWeight: styleOptions.strokeWeight || 3,
    fillColor: styleOptions.fillColor || styleOptions.strokeColor || "#FFFFFF",
    fillOpacity: styleOptions.fillOpacity ?? 0
  };

  layer.setStyle(style);
  layer.setMap(map);
  return layer;
}

function loadAlaiaLayer() {

  const layer = new google.maps.Data();

  layer.loadGeoJson("alaia.geojson");

  layer.setStyle(function(feature) {

    const code = feature.getProperty("landusecode");

    let fillColor = "#FFFFFF";

    switch (code) {

      case "CCOM":
        fillColor = "#E60000";
        break;

      case "LD":
        fillColor = "#FCFBD2";
        break;

      case "P":
        fillColor = "#00734C";
        break;

      case "VLD":
        fillColor = "#D3FFBE";
        break;

    }

    return {
      strokeColor: "#000000",
      strokeWeight: 2,
      strokeOpacity: 1,
      fillColor: fillColor,
      fillOpacity: 0.65
    };
  });

  layer.setMap(map);
}

function loadFutureGWB() {
  const layer = new google.maps.Data();

  layer.loadGeoJson("futureGWB.geojson", null, function(features) {
    // Longer feature = red, shorter feature = blue
    features.forEach((feature, index) => {
      feature.setProperty("gwbColor", index === 0 ? "#E60000" : "#0000FF");
    });
  });

  layer.setStyle(function(feature) {
    return {
      strokeColor: feature.getProperty("gwbColor") || "#E60000",
      strokeOpacity: 1,
      strokeWeight: 5,
      fillColor: feature.getProperty("gwbColor") || "#E60000",
      fillOpacity: 0.55
    };
  });

  layer.setMap(map);
}
</script>

<script async
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBLQdEBPkVAA460UQu0tla8lJuOJQew_Tc&callback=initMap">
</script>
</body>
</html>
