<!DOCTYPE html>
<html>
<head>
  <title>George Washington Blvd Corridor Exhibit</title>

  <style>
    html, body, #map {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
    }
  </style>
</head>
<body>

<div id="map"></div>

<script>
function initMap() {

  const map = new google.maps.Map(document.getElementById("map"), {
    center: { lat: 37.14, lng: -113.50 },
    zoom: 13,
    mapTypeId: "satellite",
    disableDefaultUI: true,
    tilt: 0
  });

}
</script>

<script async
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBLQdEBPkVAA460UQu0tla8lJuOJQew_Tc&callback=initMap">
</script>

</body>
</html>
